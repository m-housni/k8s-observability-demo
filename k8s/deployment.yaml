
apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: observability-api
  template:
    metadata:
      labels:
        app: observability-api
    spec:
      containers:
        - name: api
          image: username/k8s-observability-api
          ports:
            - containerPort: 3000
